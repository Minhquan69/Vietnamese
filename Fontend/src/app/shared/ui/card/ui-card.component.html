<article
  class="ui-card vlp-hover-lift"
  [class.ui-card--elevated]="variant === 'elevated'"
  [class.ui-card--glass]="variant === 'glass'"
  [class.ui-card--interactive]="interactive"
  [class.ui-card--p-none]="padding === 'none'"
  [class.ui-card--p-sm]="padding === 'sm'"
  [class.ui-card--p-md]="padding === 'md'"
  [class.ui-card--p-lg]="padding === 'lg'"
>
  <ng-content />
</article>
