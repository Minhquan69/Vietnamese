<app-auth-page title="Choose a new password" subtitle="Use a strong password you have not used elsewhere.">
  @if (!done()) {
    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      @if (error()) {
        <div class="auth-alert" role="alert">{{ error() }}</div>
      }

      <ui-input label="Email" type="email" formControlName="email" autocomplete="email" />
      <ui-input label="Reset token" formControlName="token" autocomplete="one-time-code" />
      <ui-input
        label="New password"
        type="password"
        formControlName="newPassword"
        autocomplete="new-password"
        hint="8+ characters with letters and numbers"
      />
      <ui-input
        label="Confirm new password"
        type="password"
        formControlName="confirmPassword"
        autocomplete="new-password"
        [error]="confirmError()"
      />

      <ui-button variant="primary" type="submit" [block]="true" [loading]="loading()">
        Update password
      </ui-button>

      <p class="auth-footer text-muted">
        <a routerLink="/login" class="auth-link">Back to sign in</a>
      </p>
    </form>
  } @else {
    <div class="auth-success">
      <p>Your password was updated. You can sign in with the new password.</p>
      <ui-button variant="primary" routerLink="/login">Go to sign in</ui-button>
    </div>
  }
</app-auth-page>
