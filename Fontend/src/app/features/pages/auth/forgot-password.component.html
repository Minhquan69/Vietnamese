<app-auth-page
  title="Reset access"
  subtitle="We will email instructions when mail is configured. In development you may receive a token in the response."
>
  @if (!done()) {
    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <ui-input
        label="Email"
        type="email"
        autocomplete="email"
        formControlName="email"
        [error]="
          form.controls.email.touched && form.controls.email.invalid
            ? 'Enter a valid email'
            : ''
        "
      />
      <ui-button variant="primary" type="submit" [block]="true" [loading]="loading()">
        Send reset link
      </ui-button>
      <p class="auth-footer text-muted">
        Remembered it?
        <a routerLink="/login" class="auth-link">Back to sign in</a>
      </p>
    </form>
  } @else {
    <div class="auth-success">
      <p>If an account exists for that email, you can continue the reset flow.</p>
      @if (devToken()) {
        <p class="auth-dev">
          <strong>Development token:</strong>
          <code>{{ devToken() }}</code>
        </p>
        <a
          class="auth-pill-link"
          [routerLink]="['/reset-password']"
          [queryParams]="{ email: form.controls.email.value, token: devToken()! }"
        >
          Continue to reset
        </a>
      }
      <p class="auth-footer text-muted">
        <a routerLink="/login" class="auth-link">Back to sign in</a>
      </p>
    </div>
  }
</app-auth-page>
