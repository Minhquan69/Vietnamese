<div class="progress-container">

  <h2>Learning Path</h2>

  <div *ngFor="let level of levels" class="level-card">

    <div class="level-header">
      <h3>{{ level.levelName }}</h3>
    </div>

    <div *ngFor="let course of level.courses || []" class="course-item">

      <div class="course-header">
        <span class="course-title">
          {{ course.courseName }}
        </span>
      </div>

      <div *ngFor="let unit of course.units || []" class="unit-item">

        {{ unit.unitName }}

      </div>

    </div>

  </div>

</div>
