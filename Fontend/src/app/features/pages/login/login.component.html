<app-auth-page title="Welcome back" subtitle="Sign in to continue your Vietnamese journey.">
  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
    @if (error()) {
      <div class="auth-alert" role="alert">{{ error() }}</div>
    }

    <ui-input
      label="Email"
      type="email"
      autocomplete="email"
      formControlName="email"
      [error]="
        form.controls.email.touched && form.controls.email.invalid
          ? 'Enter a valid email'
          : ''
      "
    />

    <ui-input
      label="Password"
      type="password"
      autocomplete="current-password"
      formControlName="password"
      [error]="
        form.controls.password.touched && form.controls.password.invalid
          ? 'Password is required'
          : ''
      "
    />

    <div class="auth-row">
      <label class="auth-check">
        <input type="checkbox" disabled />
        <span>Remember this device (soon)</span>
      </label>
      <a routerLink="/forgot-password" class="auth-link">Forgot password?</a>
    </div>

    <ui-button variant="primary" type="submit" [block]="true" [loading]="loading()">
      Sign in
    </ui-button>

    <p class="auth-footer text-muted">
      New here?
      <a routerLink="/user/register" class="auth-link">Create an account</a>
    </p>
  </form>
</app-auth-page>
