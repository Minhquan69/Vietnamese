<div class="profile">
  <div class="profile__header">
    <h2>Profile</h2>
    <p class="text-muted">Manage your identity and security.</p>
  </div>

  <div class="profile__grid">
    <ui-card variant="glass" padding="lg" class="profile__card">
      <h3>Photo</h3>
      <div class="profile__avatar-row">
        <div class="profile__avatar" [class.profile__avatar--empty]="!avatarSrc()">
          @if (avatarSrc()) {
            <img [src]="avatarSrc()!" alt="Avatar" />
          } @else {
            <span>{{ profileForm.controls.name.value.charAt(0) || '?' }}</span>
          }
        </div>
        <div class="profile__avatar-actions">
          <input
            #fileInput
            type="file"
            accept="image/jpeg,image/png,image/webp"
            hidden
            (change)="onAvatarSelected($event)"
          />
          <ui-button variant="secondary" type="button" [loading]="uploading()" (click)="fileInput.click()">
            Upload new photo
          </ui-button>
          <p class="text-muted profile__hint">JPEG, PNG, or WebP · max 5MB</p>
        </div>
      </div>
    </ui-card>

    <ui-card variant="elevated" padding="lg" class="profile__card">
      <h3>Account</h3>
      <form [formGroup]="profileForm" (ngSubmit)="updateProfile()" class="profile__form">
        <ui-input label="Name" formControlName="name" autocomplete="name" />
        <ui-input label="Email" type="email" formControlName="email" autocomplete="email" />
        <ui-button variant="primary" type="submit" [loading]="savingProfile()">Save changes</ui-button>
      </form>
    </ui-card>

    <ui-card variant="elevated" padding="lg" class="profile__card profile__card--wide">
      <h3>Security</h3>
      <form [formGroup]="passwordForm" (ngSubmit)="changePassword()" class="profile__form">
        <ui-input label="Current password" type="password" formControlName="oldPassword" autocomplete="current-password" />
        <ui-input
          label="New password"
          type="password"
          formControlName="newPassword"
          autocomplete="new-password"
          hint="8+ characters with letters and numbers"
        />
        <ui-button variant="secondary" type="submit" [loading]="savingPassword()">Update password</ui-button>
      </form>
    </ui-card>
  </div>
</div>
