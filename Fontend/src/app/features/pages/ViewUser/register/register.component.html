<app-auth-page title="Create your account" subtitle="Join thousands of learners building real Vietnamese fluency.">
  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
    @if (error()) {
      <div class="auth-alert" role="alert">{{ error() }}</div>
    }

    <ui-input
      label="Full name"
      autocomplete="name"
      formControlName="name"
      [error]="
        form.controls.name.touched && form.controls.name.invalid
          ? 'Enter your name (2–120 characters)'
          : ''
      "
    />

    <ui-input
      label="Email"
      type="email"
      autocomplete="email"
      formControlName="email"
      [error]="
        form.controls.email.touched && form.controls.email.invalid
          ? 'Enter a valid email'
          : ''
      "
    />

    <ui-input
      label="Password"
      type="password"
      autocomplete="new-password"
      formControlName="password"
      hint="At least 8 characters with letters and numbers"
      [error]="
        form.controls.password.touched && form.controls.password.invalid
          ? 'Use 8+ characters with letters and numbers'
          : ''
      "
    />

    <ui-input
      label="Confirm password"
      type="password"
      autocomplete="new-password"
      formControlName="confirmPassword"
      [error]="confirmPasswordError()"
    />

    <label class="auth-check">
      <input type="checkbox" formControlName="agree" />
      <span>I agree to the terms and learning data policy</span>
    </label>

    <ui-button variant="primary" type="submit" [block]="true" [loading]="loading()">
      Create account
    </ui-button>

    <p class="auth-footer text-muted">
      Already learning with us?
      <a routerLink="/login" class="auth-link">Sign in</a>
    </p>
  </form>
</app-auth-page>
